<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Doll House Dress Up</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <h1>Doll House Dress Up</h1>
    <p>Dress up the doll by choosing clothes and accessories!</p>
    <div id="game">
        <div id="doll-container">
            <img id="doll-base" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='400'><circle cx='100' cy='80' r='50' fill='%23f9d5b3'/><rect x='50' y='130' width='100' height='200' fill='%23f9d5b3'/></svg>" alt="Doll Base" />
            <img id="hair" class="layer" src="" alt="Hair" />
            <img id="dress" class="layer" src="" alt="Dress" />
            <img id="shoes" class="layer" src="" alt="Shoes" />
            <img id="accessory" class="layer" src="" alt="Accessory" />
        </div>
        <div id="options">
            <div class="option-group">
                <h3>Hair</h3>
                <button class="option-btn" data-type="hair" data-src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='400'><circle cx='100' cy='80' r='50' fill='%23f9d5b3'/><rect x='50' y='130' width='100' height='200' fill='%23f9d5b3'/><ellipse cx='100' cy='50' rx='70' ry='60' fill='%23a0522d'/></svg>">Brown Hair</button>
                <button class="option-btn" data-type="hair" data-src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='400'><circle cx='100' cy='80' r='50' fill='%23f9d5b3'/><rect x='50' y='130' width='100' height='200' fill='%23f9d5b3'/><ellipse cx='100' cy='50' rx='70' ry='60' fill='%23ffdbac'/></svg>">Blonde Hair</button>
                <button class="option-btn" data-type="hair" data-src="">No Hair</button>
            </div>
            <div class="option-group">
                <h3>Dress</h3>
                <button class="option-btn" data-type="dress" data-src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='400'><circle cx='100' cy='80' r='50' fill='%23f9d5b3'/><rect x='50' y='130' width='100' height='200' fill='%23f9d5b3'/><rect x='60' y='130' width='80' height='150' fill='%23ff69b4'/></svg>">Pink Dress</button>
                <button class="option-btn" data-type="dress" data-src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='400'><circle cx='100' cy='80' r='50' fill='%23f9d5b3'/><rect x='50' y='130' width='100' height='200' fill='%23f9d5b3'/><rect x='60' y='130' width='80' height='150' fill='%23007acc'/></svg>">Blue Dress</button>
                <button class="option-btn" data-type="dress" data-src="">No Dress</button>
            </div>
            <div class="option-group">
                <h3>Shoes</h3>
                <button class="option-btn" data-type="shoes" data-src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='400'><circle cx='100' cy='80' r='50' fill='%23f9d5b3'/><rect x='50' y='130' width='100' height='200' fill='%23f9d5b3'/><rect x='70' y='320' width='30' height='20' fill='%23ff4500'/><rect x='100' y='320' width='30' height='20' fill='%23ff4500'/></svg>">Red Shoes</button>
                <button class="option-btn" data-type="shoes" data-src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='400'><circle cx='100' cy='80' r='50' fill='%23f9d5b3'/><rect x='50' y='130' width='100' height='200' fill='%23f9d5b3'/><rect x='70' y='320' width='30' height='20' fill='%23000000'/><rect x='100' y='320' width='30' height='20' fill='%23000000'/></svg>">Black Shoes</button>
                <button class="option-btn" data-type="shoes" data-src="">No Shoes</button>
            </div>
            <div class="option-group">
                <h3>Accessory</h3>
                <button class="option-btn" data-type="accessory" data-src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='400'><circle cx='100' cy='80' r='50' fill='%23f9d5b3'/><rect x='50' y='130' width='100' height='200' fill='%23f9d5b3'/><circle cx='140' cy='120' r='15' fill='%23ff6347'/></svg>">Red Flower</button>
                <button class="option-btn" data-type="accessory" data-src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='400'><circle cx='100' cy='80' r='50' fill='%23f9d5b3'/><rect x='50' y='130' width='100' height='200' fill='%23f9d5b3'/><circle cx='60' cy='120' r='15' fill='%2300ff00'/></svg>">Green Leaf</button>
                <button class="option-btn" data-type="accessory" data-src="">No Accessory</button>
            </div>
        </div>
    </div>
    <div id="controls">
        <button id="start-btn">Start Game</button>
        <p id="message"></p>
        <p>Score: <span id="score">0</span></p>
    </div>
    <script src="script.js"></script>
</body>
</html>

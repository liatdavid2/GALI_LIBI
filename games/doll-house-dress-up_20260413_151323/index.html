<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Doll House Dress Up</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Doll House Dress Up</h1>
  <div id="game">
    <div id="doll-house">
      <img id="doll" src="" alt="Doll" />
      <div id="clothes">
        <button class="clothes-btn" data-item="hat">🎩 Hat</button>
        <button class="clothes-btn" data-item="shirt">👕 Shirt</button>
        <button class="clothes-btn" data-item="pants">👖 Pants</button>
        <button class="clothes-btn" data-item="shoes">👟 Shoes</button>
      </div>
    </div>
    <div id="status">
      <p>Score: <span id="score">0</span> / 4</p>
      <p id="message"></p>
      <button id="start-btn">Start Game</button>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>

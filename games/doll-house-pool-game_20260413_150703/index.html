<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Doll House Pool Game</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <h1>Doll House Pool Game</h1>
    <p>Click the blue balls in the pool before time runs out!</p>
    <div id="game-area">
        <div id="pool">
            <!-- Balls will appear here -->
        </div>
        <div id="score-board">
            Score: <span id="score">0</span>
        </div>
        <div id="message"></div>
        <button id="start-button">Start Game</button>
    </div>
    <script src="script.js"></script>
</body>
</html>

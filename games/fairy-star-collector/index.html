<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Fairy Star Collector</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Fairy Star Collector</h1>
  <div id="game-container" aria-label="Fairy star collector game area">
    <div id="player" tabindex="0" aria-label="Fairy character"></div>
    <div id="bubble" aria-label="Star bubble to catch"></div>
  </div>
  <div id="info">
    <div>Score: <span id="score">0</span></div>
    <div id="message"></div>
    <button id="start-button">Start Game</button>
  </div>
  <script src="script.js"></script>
</body>
</html>

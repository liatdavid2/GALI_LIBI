<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Fairy Star and Bubble Collector</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <h1>Fairy Star and Bubble Collector</h1>
    <div id="gameArea">
        <div id="fairy"></div>
        <div id="star" class="collectible"></div>
        <div id="bubble" class="collectible"></div>
    </div>
    <div id="info">
        <div>Score: <span id="score">0</span></div>
        <button id="startBtn">Start Game</button>
        <div id="message"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PJ Video Site</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: white;
  background: linear-gradient(90deg,#00ff88 0%,#1e90ff 50%,#ff2d55 100%);
}

.hero {
  position: relative;
  height: 70vh;
  min-height: 500px;
  overflow: hidden;
}

.hero iframe {
  width: 100%;
  height: 100%;
  border: none;
}

.hero::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
}

.hero-content {
  position: absolute;
  bottom: 40px;
  right: 40px;
  z-index: 2;
  max-width: 500px;
}

.hero h1 {
  font-size: 2.5rem;
  margin-bottom: 10px;
}

.hero p {
  font-size: 1.1rem;
  opacity: 0.9;
}

.btn {
  margin-top: 10px;
  display: inline-block;
  padding: 10px 16px;
  border-radius: 8px;
  background: #ff2d55;
  font-weight: bold;
  cursor: pointer;
  margin-left: 8px;
}

.section {
  padding: 40px 20px;
  text-align: center;
}

.section h2 {
  font-size: 2rem;
  margin-bottom: 20px;
}

.videos {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 20px;
  max-width: 1100px;
  margin: auto;
}

.video-card {
  background: rgba(0,0,0,0.3);
  border-radius: 12px;
  overflow: hidden;
  transition: 0.3s;
}

.video-card:hover {
  transform: translateY(-5px);
}

.video-card iframe {
  width: 100%;
  height: 180px;
  border: none;
}

.video-title {
  padding: 10px;
  font-weight: bold;
}

.video-actions {
  padding: 8px;
}

.small-btn {
  padding: 6px 10px;
  background: #2d7dff;
  border-radius: 6px;
  cursor: pointer;
  display: inline-block;
  margin: 4px;
}

@media (max-width: 600px) {
  .hero {
    height: 50vh;
    min-height: 300px;
  }

  .hero-content {
    right: 20px;
    bottom: 20px;
  }

  .hero h1 {
    font-size: 1.6rem;
  }
}
</style>
</head>

<body>

<div class="hero" id="hero">
  <iframe id="mainVideo"
    src="https://www.youtube.com/embed/BEpLqsbAnEM?autoplay=1&mute=1"
    allow="autoplay; encrypted-media"
    allowfullscreen>
  </iframe>

  <div class="hero-content">
    <h1>הרפתקה מתחילה כאן</h1>
    <p>צפו בסרטון המרכזי והצטרפו לעולם של גיבורים צבעוניים</p>
    <div class="btn" onclick="enableSound()">🔊 הפעל קול</div>
    <div class="btn" onclick="goFullscreen('hero')">⛶ מסך מלא</div>
  </div>
</div>

<div class="section">
  <h2>🎬 סרטונים נוספים</h2>

  <div class="videos">

    <div class="video-card" id="v1">
      <iframe id="vid1" src="https://www.youtube.com/embed/YhYBe4WMEMU?mute=1"></iframe>
      <div class="video-title">ילד חתול</div>
      <div class="video-actions">
        <div class="small-btn" onclick="unmute('vid1','YhYBe4WMEMU')">🔊</div>
        <div class="small-btn" onclick="goFullscreen('v1')">⛶</div>
      </div>
    </div>

    <div class="video-card" id="v2">
      <iframe id="vid2" src="https://www.youtube.com/embed/b4W6Tgjha8Q?mute=1"></iframe>
      <div class="video-title">גיאקו</div>
      <div class="video-actions">
        <div class="small-btn" onclick="unmute('vid2','b4W6Tgjha8Q')">🔊</div>
        <div class="small-btn" onclick="goFullscreen('v2')">⛶</div>
      </div>
    </div>

    <div class="video-card" id="v3">
      <iframe id="vid3" src="https://www.youtube.com/embed/GDe2DBYEX3I?mute=1"></iframe>
      <div class="video-title">ינשופונת</div>
      <div class="video-actions">
        <div class="small-btn" onclick="unmute('vid3','GDe2DBYEX3I')">🔊</div>
        <div class="small-btn" onclick="goFullscreen('v3')">⛶</div>
      </div>
    </div>

    <div class="video-card" id="v4">
      <iframe id="vid4" src="https://www.youtube.com/embed/obkKy8FeJ6Y?mute=1"></iframe>
      <div class="video-title">פיגי רובוט</div>
      <div class="video-actions">
        <div class="small-btn" onclick="unmute('vid4','obkKy8FeJ6Y')">🔊</div>
        <div class="small-btn" onclick="goFullscreen('v4')">⛶</div>
      </div>
    </div>

  </div>
</div>

<script>
function stopAllVideos() {
  const iframes = document.querySelectorAll('iframe');
  iframes.forEach((iframe) => {
    const src = iframe.src;
    iframe.src = src; // reload → stops video
  });
}

function enableSound() {
  stopAllVideos();
  document.getElementById('mainVideo').src = "https://www.youtube.com/embed/BEpLqsbAnEM?autoplay=1&mute=0";
}

function unmute(id, videoId) {
  stopAllVideos();
  document.getElementById(id).src = `https://www.youtube.com/embed/${videoId}?autoplay=1&mute=0`;
}?autoplay=1&mute=0`;
}

function goFullscreen(id) {
  const el = document.getElementById(id);
  if (el.requestFullscreen) el.requestFullscreen();
}
</script>

</body>
</html>

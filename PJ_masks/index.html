<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PJ Video Site</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: white;
  background: linear-gradient(90deg,#00ff88 0%,#1e90ff 50%,#ff2d55 100%);
}

.hero {
  position: relative;
  height: 70vh;
  min-height: 500px;
  overflow: hidden;
}

.hero iframe {
  width: 100%;
  height: 100%;
  border: none;
}

.hero::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
}

.hero-content {
  position: absolute;
  bottom: 40px;
  right: 40px;
  z-index: 2;
  max-width: 500px;
}

.btn {
  margin-top: 10px;
  display: inline-block;
  padding: 10px 16px;
  border-radius: 8px;
  background: #ff2d55;
  font-weight: bold;
  cursor: pointer;
  margin-left: 8px;
}

.section {
  padding: 40px 20px;
  text-align: center;
}

.videos {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 20px;
  max-width: 1100px;
  margin: auto;
}

.video-card {
  background: rgba(0,0,0,0.3);
  border-radius: 12px;
  overflow: hidden;
}

.video-card iframe {
  width: 100%;
  height: 180px;
}

.video-actions {
  padding: 8px;
}

.small-btn {
  padding: 6px 10px;
  background: #2d7dff;
  border-radius: 6px;
  cursor: pointer;
  margin: 4px;
}
</style>
</head>

<body>

<div class="hero">
  <iframe id="mainVideo" src="https://www.youtube.com/embed/BEpLqsbAnEM?mute=1"></iframe>

  <div class="hero-content">
    <div class="btn" onclick="toggleVideo('mainVideo','BEpLqsbAnEM', this)">▶ הפעל</div>
    <div class="btn" onclick="goFullscreenIframe('mainVideo')">⛶</div>
  </div>
</div>

<div class="section">
  <h2>🎬 סרטונים נוספים</h2>

  <div class="videos">

    <div class="video-card">
      <iframe id="vid1" src="https://www.youtube.com/embed/YhYBe4WMEMU?mute=1"></iframe>
      <div class="video-actions">
        <div class="small-btn" onclick="toggleVideo('vid1','YhYBe4WMEMU', this)">▶</div>
        <div class="small-btn" onclick="goFullscreenIframe('vid1')">⛶</div>
      </div>
    </div>

    <div class="video-card">
      <iframe id="vid2" src="https://www.youtube.com/embed/b4W6Tgjha8Q?mute=1"></iframe>
      <div class="video-actions">
        <div class="small-btn" onclick="toggleVideo('vid2','b4W6Tgjha8Q', this)">▶</div>
        <div class="small-btn" onclick="goFullscreenIframe('vid2')">⛶</div>
      </div>
    </div>

    <div class="video-card">
      <iframe id="vid3" src="https://www.youtube.com/embed/GDe2DBYEX3I?mute=1"></iframe>
      <div class="video-actions">
        <div class="small-btn" onclick="toggleVideo('vid3','GDe2DBYEX3I', this)">▶</div>
        <div class="small-btn" onclick="goFullscreenIframe('vid3')">⛶</div>
      </div>
    </div>

    <div class="video-card">
      <iframe id="vid4" src="https://www.youtube.com/embed/obkKy8FeJ6Y?mute=1"></iframe>
      <div class="video-actions">
        <div class="small-btn" onclick="toggleVideo('vid4','obkKy8FeJ6Y', this)">▶</div>
        <div class="small-btn" onclick="goFullscreenIframe('vid4')">⛶</div>
      </div>
    </div>

  </div>
</div>

<script>
let currentPlaying = null;

function stopAll() {
  document.querySelectorAll('iframe').forEach(f => f.src = f.src);
}

function resetButtons() {
  document.querySelectorAll('.small-btn, .btn').forEach(btn => {
    if (btn.innerText.includes('⛶')) return;
    btn.innerText = btn.innerText.includes('הפעל') ? '▶ הפעל' : '▶';
  });
}

function toggleVideo(id, videoId, btn) {
  if (currentPlaying === id) {
    stopAll();
    currentPlaying = null;
    btn.innerText = btn.innerText.includes('הפעל') ? '▶ הפעל' : '▶';
    return;
  }

  stopAll();
  resetButtons();

  document.getElementById(id).src =
    `https://www.youtube.com/embed/${videoId}?autoplay=1&mute=0`;

  currentPlaying = id;

  if (btn.innerText.includes('הפעל')) {
    btn.innerText = '⏸ הפסק';
  } else {
    btn.innerText = '⏸';
  }
}

function goFullscreenIframe(id) {
  const iframe = document.getElementById(id);
  if (iframe.requestFullscreen) iframe.requestFullscreen();
}
</script>

</body>
</html>

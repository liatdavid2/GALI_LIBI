<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PJ Video Site</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      background: linear-gradient(90deg,#00ff88 0%,#1e90ff 50%,#ff2d55 100%);
    }

    /* HERO VIDEO */
    .hero {
      width: 100%;
      min-height: 500px; 
      height: 70vh;
      position: relative;
    }

    .hero iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* SECTION */
    .section {
      padding: 30px 16px;
      text-align: center;
    }

    .section h2 {
      font-size: 2rem;
      margin-bottom: 20px;
    }

    /* VIDEO GRID */
    .videos {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
      max-width: 1200px;
      margin: auto;
    }

    iframe.small {
      width: 100%;
      height: 200px;
      border-radius: 12px;
      border: none;
    }

    /* RESPONSIVE */
    @media (max-width: 900px) {
      .hero { height: 50vh; }
      iframe.small { height: 180px; }
    }

    @media (max-width: 500px) {
      .hero { height: 40vh; }
      iframe.small { height: 160px; }
    }

  </style>
</head>

<body>

  <!-- MAIN VIDEO -->
  <div class="hero">
    <iframe
      src="https://www.youtube.com/embed/BEpLqsbAnEM?autoplay=1&mute=1"
      allow="autoplay; encrypted-media"
      allowfullscreen>
    </iframe>
  </div>

  <!-- OTHER VIDEOS -->
  <div class="section">
    <h2>🎬 סרטונים נוספים</h2>

    <div class="videos">

      <iframe class="small" src="https://www.youtube.com/embed/ysz5S6PUM-U" allowfullscreen></iframe>

      <iframe class="small" src="https://www.youtube.com/embed/TcMBFSGVi1c" allowfullscreen></iframe>

      <iframe class="small" src="https://www.youtube.com/embed/aqz-KE-bpKQ" allowfullscreen></iframe>

    </div>
  </div>

</body>
</html>

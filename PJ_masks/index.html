<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PJ Video Site</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: white;
  background: linear-gradient(90deg,#00ff88 0%,#1e90ff 50%,#ff2d55 100%);
}

.hero {
  position: relative;
  height: 70vh;
  min-height: 500px;
}

.hero iframe {
  width: 100%;
  height: 100%;
  border: none;
}

.hero::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
}

.hero-content {
  position: absolute;
  bottom: 40px;
  right: 40px;
  z-index: 2;
}

.btn {
  margin-top: 10px;
  padding: 10px 16px;
  border-radius: 8px;
  background: #ff2d55;
  cursor: pointer;
  display: inline-block;
  margin-left: 10px;
}

.section {
  padding: 40px 20px;
  text-align: center;
}

.videos {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 20px;
  max-width: 1100px;
  margin: auto;
}

.video-card {
  background: rgba(0,0,0,0.3);
  border-radius: 12px;
  overflow: hidden;
}

.video-card iframe {
  width: 100%;
  height: 180px;
}

.video-actions {
  padding: 10px;
}

.small-btn {
  padding: 6px 10px;
  border-radius: 6px;
  background: #2d7dff;
  cursor: pointer;
  display: inline-block;
  margin: 4px;
}

@media (max-width: 600px) {
  .hero { height: 50vh; min-height: 300px; }
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero" id="hero">
  <iframe id="mainVideo"
    src="https://www.youtube.com/embed/BEpLqsbAnEM?autoplay=1&mute=1"
    allow="autoplay; encrypted-media"
    allowfullscreen>
  </iframe>

  <div class="hero-content">
    <div class="btn" onclick="unmuteMain()">🔊 הפעל קול</div>
    <div class="btn" onclick="fullscreen('hero')">⛶ מסך מלא</div>
  </div>
</div>

<!-- VIDEOS -->
<div class="section">
  <h2>🎬 סרטונים נוספים</h2>

  <div class="videos">

    <div class="video-card" id="v1">
      <iframe id="vid1" src="https://www.youtube.com/embed/ysz5S6PUM-U?mute=1"></iframe>
      <div class="video-actions">
        <div class="small-btn" onclick="unmute('vid1','ysz5S6PUM-U')">🔊 קול</div>
        <div class="small-btn" onclick="fullscreen('v1')">⛶ מסך מלא</div>
      </div>
    </div>

    <div class="video-card" id="v2">
      <iframe id="vid2" src="https://www.youtube.com/embed/TcMBFSGVi1c?mute=1"></iframe>
      <div class="video-actions">
        <div class="small-btn" onclick="unmute('vid2','TcMBFSGVi1c')">🔊 קול</div>
        <div class="small-btn" onclick="fullscreen('v2')">⛶ מסך מלא</div>
      </div>
    </div>

    <div class="video-card" id="v3">
      <iframe id="vid3" src="https://www.youtube.com/embed/aqz-KE-bpKQ?mute=1"></iframe>
      <div class="video-actions">
        <div class="small-btn" onclick="unmute('vid3','aqz-KE-bpKQ')">🔊 קול</div>
        <div class="small-btn" onclick="fullscreen('v3')">⛶ מסך מלא</div>
      </div>
    </div>

  </div>
</div>

<script>
function unmuteMain() {
  const iframe = document.getElementById('mainVideo');
  iframe.src = "https://www.youtube.com/embed/BEpLqsbAnEM?autoplay=1&mute=0";
}

function unmute(id, videoId) {
  document.getElementById(id).src = `https://www.youtube.com/embed/${videoId}?autoplay=1&mute=0`;
}

function fullscreen(id) {
  const el = document.getElementById(id);
  if (el.requestFullscreen) el.requestFullscreen();
  else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
  else if (el.msRequestFullscreen) el.msRequestFullscreen();
}
</script>

</body>
</html>

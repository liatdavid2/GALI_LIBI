<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PJ Style Site</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;

      /* Gradient background */
      background: linear-gradient(
        90deg,
        #00ff88 0%,
        #1e90ff 50%,
        #ff2d55 100%
      );

      min-height: 100vh;
    }

    .hero {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 80vh;
      text-align: center;
    }

    .hero img {
      max-width: 600px;
      width: 90%;

      filter: drop-shadow(0 0 40px rgba(255,255,255,0.7));
      transition: 0.3s;
    }

    .hero img:hover {
      transform: scale(1.05);
    }

    .section {
      padding: 40px 20px;
      text-align: center;
    }

    .section h2 {
      font-size: 2rem;
      margin-bottom: 20px;
    }

    .videos {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      max-width: 1000px;
      margin: auto;
    }

    iframe {
      width: 100%;
      height: 200px;
      border-radius: 12px;
      border: none;
    }

  </style>
</head>

<body>

  <!-- HERO IMAGE -->
  <div class="hero">
    <img src="https://mesibalend.co.il/wp-content/uploads/2021/12/PJ.png" alt="PJ Masks">
  </div>

  <!-- VIDEO SECTION -->
  <div class="section">
    <h2>🎬 סרטונים</h2>

    <div class="videos">

      <!-- Replace videos here -->
      <iframe src="https://www.youtube.com/embed/ysz5S6PUM-U" allowfullscreen></iframe>

      <iframe src="https://www.youtube.com/embed/TcMBFSGVi1c" allowfullscreen></iframe>

      <iframe src="https://www.youtube.com/embed/aqz-KE-bpKQ" allowfullscreen></iframe>

    </div>
  </div>

</body>
</html>

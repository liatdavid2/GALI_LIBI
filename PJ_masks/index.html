<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PJ Style Site</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;

      background: linear-gradient(90deg,#00ff88 0%,#1e90ff 50%,#ff2d55 100%);
      min-height: 100vh;
    }

    /* HERO FULL WIDTH */
    .hero {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px 0;
    }

    .hero img {
      width: 100%;
      max-width: 1200px;
      height: auto;
      object-fit: contain;

      filter: drop-shadow(0 0 30px rgba(255,255,255,0.6));
      transition: 0.3s;
    }

    .hero img:hover {
      transform: scale(1.02);
    }

    /* SECTION */
    .section {
      padding: 30px 16px;
      text-align: center;
    }

    .section h2 {
      font-size: 2rem;
      margin-bottom: 20px;
    }

    /* VIDEO GRID */
    .videos {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
      max-width: 1200px;
      margin: auto;
    }

    iframe {
      width: 100%;
      height: 200px;
      border-radius: 12px;
      border: none;
    }

    /* RESPONSIVE */

    /* Tablet */
    @media (max-width: 900px) {
      .section h2 {
        font-size: 1.6rem;
      }

      iframe {
        height: 180px;
      }
    }

    /* Mobile */
    @media (max-width: 500px) {
      .hero {
        padding: 10px 0;
      }

      .section {
        padding: 20px 12px;
      }

      iframe {
        height: 160px;
      }
    }

  </style>
</head>

<body>

  <!-- HERO IMAGE FULL WIDTH -->
  <div class="hero">
    <img src="https://mesibalend.co.il/wp-content/uploads/2021/12/PJ.png" alt="PJ Masks">
  </div>

  <!-- VIDEO SECTION -->
  <div class="section">
    <h2>🎬 סרטונים</h2>

    <div class="videos">
        <iframe
            src="https://www.youtube.com/embed/xs62_c-YfRc?si=Z35ZHg3Sjt_llA4x"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
            allowfullscreen>
          </iframe>
      <iframe src="https://www.youtube.com/embed/ysz5S6PUM-U" allowfullscreen></iframe>

      <iframe src="https://www.youtube.com/embed/TcMBFSGVi1c" allowfullscreen></iframe>

      <iframe src="https://www.youtube.com/embed/aqz-KE-bpKQ" allowfullscreen></iframe>

    </div>
  </div>

</body>
</html>
